<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — MDS Visit</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0e14;color:#e0e6f0;min-height:100vh;}

/* PIN */
#pin-screen{position:fixed;inset:0;background:#0a0e14;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:100;}
#pin-screen.hidden{display:none;}
.pin-logo{font-size:32px;margin-bottom:8px;}
.pin-title{font-size:22px;font-weight:700;color:#fff;}
.pin-sub{font-size:13px;color:rgba(255,255,255,.35);}
#pin-input{margin-top:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:12px 20px;color:#fff;font-size:16px;text-align:center;letter-spacing:4px;width:260px;outline:none;}
#pin-input:focus{border-color:rgba(62,207,109,.5);}
.pin-err{color:#ff6b6b;font-size:12px;min-height:16px;}
.pin-btn{background:#3ECF6D;color:#000;font-weight:700;font-size:14px;padding:12px 0;border-radius:10px;border:none;cursor:pointer;width:260px;transition:opacity .2s;}
.pin-btn:hover{opacity:.85;}

/* LAYOUT */
#app{display:none;}
#app.visible{display:block;}
.topbar{background:#111720;border-bottom:1px solid rgba(255,255,255,.06);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:56px;}
.tb-left{display:flex;align-items:center;gap:12px;}
.tb-logo{font-size:20px;}
.tb-title{font-size:15px;font-weight:700;color:#fff;}
.tb-sub{font-size:11px;color:rgba(255,255,255,.3);margin-top:1px;}
.tb-right{display:flex;align-items:center;gap:8px;}
.tb-date{font-size:12px;color:rgba(255,255,255,.3);}

.main{max-width:1400px;margin:0 auto;padding:28px 32px;}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px;}
.stat-card{background:#111720;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:20px 22px;}
.stat-label{font-size:11px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
.stat-val{font-size:32px;font-weight:700;color:#3ECF6D;line-height:1.1;}
.stat-sub{font-size:11px;color:rgba(255,255,255,.25);margin-top:4px;}

/* FILTERS */
.filter-bar{background:#111720;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:16px 20px;display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.filter-label{font-size:11px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.06em;}
.date-pills{display:flex;gap:6px;}
.date-pill{padding:6px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.1);background:transparent;color:rgba(255,255,255,.4);font-size:12px;cursor:pointer;transition:all .15s;}
.date-pill.active{background:#3ECF6D;border-color:#3ECF6D;color:#000;font-weight:600;}
.filter-sep{width:1px;height:24px;background:rgba(255,255,255,.08);}
.filter-input{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:7px 12px;color:#fff;font-size:13px;outline:none;width:180px;}
.filter-input:focus{border-color:rgba(62,207,109,.4);}
.filter-input::placeholder{color:rgba(255,255,255,.2);}
.filter-clear{font-size:12px;color:rgba(255,255,255,.3);cursor:pointer;text-decoration:underline;white-space:nowrap;}

/* TABS + TABLE */
.panel{background:#111720;border:1px solid rgba(255,255,255,.07);border-radius:14px;overflow:hidden;}
.panel-tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.07);}
.panel-tab{padding:14px 24px;font-size:13px;font-weight:600;color:rgba(255,255,255,.35);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
.panel-tab.active{color:#3ECF6D;border-bottom-color:#3ECF6D;}
.panel-body{overflow-x:auto;}

table{width:100%;border-collapse:collapse;font-size:13px;}
thead{background:rgba(255,255,255,.03);}
th{text-align:left;padding:12px 16px;font-size:11px;font-weight:600;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.07em;white-space:nowrap;cursor:pointer;user-select:none;}
th:hover{color:rgba(255,255,255,.6);}
th .sort-arrow{margin-left:4px;opacity:.4;}
td{padding:12px 16px;border-top:1px solid rgba(255,255,255,.04);vertical-align:middle;}
tr:hover td{background:rgba(255,255,255,.02);}
.td-id{font-weight:700;color:#3ECF6D;font-size:11px;letter-spacing:.04em;}
.td-mds{font-weight:600;color:#fff;}
.td-area{color:rgba(255,255,255,.45);font-size:12px;}
.td-store{color:rgba(255,255,255,.6);}
.tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;}
.tag.green{background:rgba(62,207,109,.15);color:#3ECF6D;}
.tag.red{background:rgba(255,80,80,.12);color:#ff7070;}
.tag.blue{background:rgba(80,140,255,.12);color:#7eb3ff;}
.tag.gold{background:rgba(255,195,50,.12);color:#ffc532;}

.tfoot-row{padding:14px 16px;font-size:12px;color:rgba(255,255,255,.25);border-top:1px solid rgba(255,255,255,.06);}
.empty-state{text-align:center;padding:60px 20px;color:rgba(255,255,255,.2);font-size:14px;}

/* EXPORT */
.export-btn{margin-left:auto;background:rgba(62,207,109,.1);border:1px solid rgba(62,207,109,.25);color:#3ECF6D;padding:7px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
.export-btn:hover{background:rgba(62,207,109,.2);}
</style>
</head>
<body>

<!-- PIN SCREEN -->
<div id="pin-screen">
  <div class="pin-logo">📊</div>
  <div class="pin-title">MDS Visit Dashboard</div>
  <div class="pin-sub">Masukkan PIN supervisor untuk melanjutkan</div>
  <input id="pin-input" type="password" placeholder="••••••••••" maxlength="20" onkeydown="if(event.key==='Enter')checkPin()">
  <div class="pin-err" id="pin-err"></div>
  <button class="pin-btn" onclick="checkPin()">Masuk</button>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="topbar">
    <div class="tb-left">
      <div class="tb-logo">📊</div>
      <div>
        <div class="tb-title">MDS Visit — Dashboard</div>
        <div class="tb-sub">Nutrifood Sulawesi</div>
      </div>
    </div>
    <div class="tb-right">
      <div class="tb-date" id="tb-date"></div>
    </div>
  </div>

  <div class="main">
    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Visit RKA</div>
        <div class="stat-val" id="ds-rka">—</div>
        <div class="stat-sub" id="ds-rka-sub">kunjungan</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Beli Barang</div>
        <div class="stat-val" id="ds-beli">—</div>
        <div class="stat-sub" id="ds-beli-sub">transaksi</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">MDS Aktif</div>
        <div class="stat-val" id="ds-mds">—</div>
        <div class="stat-sub">periode terpilih</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Pembelian</div>
        <div class="stat-val" id="ds-nom" style="font-size:22px;padding-top:6px">—</div>
        <div class="stat-sub">periode terpilih</div>
      </div>
    </div>

    <!-- FILTERS -->
    <div class="filter-bar">
      <span class="filter-label">Periode</span>
      <div class="date-pills">
        <div class="date-pill active" onclick="setDateFilter('today')">Hari Ini</div>
        <div class="date-pill" onclick="setDateFilter('week')">7 Hari</div>
        <div class="date-pill" onclick="setDateFilter('month')">30 Hari</div>
        <div class="date-pill" onclick="setDateFilter('all')">Semua</div>
      </div>
      <div class="filter-sep"></div>
      <input class="filter-input" id="f-area" placeholder="Filter area…" oninput="applyFilters()">
      <input class="filter-input" id="f-mds" placeholder="Filter MDS…" oninput="applyFilters()">
      <input class="filter-input" id="f-store" placeholder="Filter toko…" oninput="applyFilters()">
      <span class="filter-clear" onclick="clearFilters()">Reset</span>
      <button class="export-btn" onclick="exportCSV()">⬇ Export CSV</button>
    </div>

    <!-- TABLE PANEL -->
    <div class="panel">
      <div class="panel-tabs">
        <div class="panel-tab active" id="ptab-rka" onclick="switchTab('rka')">Visit RKA</div>
        <div class="panel-tab" id="ptab-beli" onclick="switchTab('beli')">Beli Barang</div>
      </div>
      <div class="panel-body">
        <table id="data-table">
          <thead id="table-head"></thead>
          <tbody id="table-body"></tbody>
        </table>
        <div class="tfoot-row" id="tfoot"></div>
      </div>
    </div>
  </div>
</div>

<script>
const DASH_PIN = 'Nutrifood2026';
const firebaseConfig = {
  apiKey:"AIzaSyCtYc8uZICLzQrA1b7l00Yo_9V_rqNVOu0",
  authDomain:"mds-visit.firebaseapp.com",
  projectId:"mds-visit",
  storageBucket:"mds-visit.firebasestorage.app",
  messagingSenderId:"732603054928",
  appId:"1:732603054928:web:9f946bfa13d56d860a8a55"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let RKA_ALL=[], BELI_ALL=[], ACTIVE_TAB='rka', DATE_FILTER='today', SORT_COL='timestamp', SORT_DIR=-1;

// ── PIN ──────────────────────────────────────────────────────────────────────
function checkPin(){
  if(document.getElementById('pin-input').value === DASH_PIN){
    document.getElementById('pin-screen').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
    initDash();
  } else {
    document.getElementById('pin-err').textContent = 'PIN salah, coba lagi.';
    document.getElementById('pin-input').value = '';
  }
}
document.getElementById('pin-input').focus();

// ── INIT ─────────────────────────────────────────────────────────────────────
function initDash(){
  document.getElementById('tb-date').textContent = new Date().toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  db.collection('rka_logs').orderBy('timestamp','desc').limit(1000)
    .onSnapshot(snap=>{
      RKA_ALL=[];
      snap.forEach(doc=>{ const d=doc.data(); RKA_ALL.push({...d,timestamp:d.timestamp?d.timestamp.toDate():new Date()}); });
      render();
    });

  db.collection('beli_logs').orderBy('timestamp','desc').limit(1000)
    .onSnapshot(snap=>{
      BELI_ALL=[];
      snap.forEach(doc=>{ const d=doc.data(); BELI_ALL.push({...d,timestamp:d.timestamp?d.timestamp.toDate():new Date()}); });
      render();
    });
}

// ── FILTERS ──────────────────────────────────────────────────────────────────
function getDateCutoff(){
  const now=new Date();
  if(DATE_FILTER==='today'){ const d=new Date(now); d.setHours(0,0,0,0); return d; }
  if(DATE_FILTER==='week'){ const d=new Date(now); d.setDate(d.getDate()-7); return d; }
  if(DATE_FILTER==='month'){ const d=new Date(now); d.setDate(d.getDate()-30); return d; }
  return new Date(0);
}
function setDateFilter(f){
  DATE_FILTER=f;
  document.querySelectorAll('.date-pill').forEach(p=>p.classList.remove('active'));
  event.target.classList.add('active');
  render();
}
function applyFilters(){ render(); }
function clearFilters(){
  document.getElementById('f-area').value='';
  document.getElementById('f-mds').value='';
  document.getElementById('f-store').value='';
  render();
}
function filtered(data){
  const cutoff=getDateCutoff();
  const fa=document.getElementById('f-area').value.toLowerCase();
  const fm=document.getElementById('f-mds').value.toLowerCase();
  const fs=document.getElementById('f-store').value.toLowerCase();
  return data.filter(r=>{
    if(r.timestamp<cutoff) return false;
    if(fa && !(r.area||'').toLowerCase().includes(fa)) return false;
    if(fm && !(r.mds||'').toLowerCase().includes(fm)) return false;
    if(fs && !(r.store||'').toLowerCase().includes(fs)) return false;
    return true;
  });
}

// ── SORT ─────────────────────────────────────────────────────────────────────
function sortBy(col){
  if(SORT_COL===col) SORT_DIR*=-1; else { SORT_COL=col; SORT_DIR=-1; }
  render();
}
function sorted(data){
  return [...data].sort((a,b)=>{
    let av=a[SORT_COL], bv=b[SORT_COL];
    if(av instanceof Date) return SORT_DIR*(av-bv);
    if(typeof av==='number') return SORT_DIR*(av-bv);
    return SORT_DIR*String(av||'').localeCompare(String(bv||''));
  });
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function switchTab(tab){
  ACTIVE_TAB=tab;
  document.getElementById('ptab-rka').classList.toggle('active',tab==='rka');
  document.getElementById('ptab-beli').classList.toggle('active',tab==='beli');
  render();
}
function arrow(col){ return SORT_COL===col?(SORT_DIR>0?'↑':'↓'):''; }

function render(){
  const data=ACTIVE_TAB==='rka'?RKA_ALL:BELI_ALL;
  const rows=sorted(filtered(data));

  // Stats (always on filtered+all data combined)
  const rkaF=filtered(RKA_ALL), beliF=filtered(BELI_ALL);
  document.getElementById('ds-rka').textContent=rkaF.length;
  document.getElementById('ds-beli').textContent=beliF.length;
  const mdsSet=new Set([...rkaF.map(r=>r.mds),...beliF.map(r=>r.mds)]);
  document.getElementById('ds-mds').textContent=mdsSet.size;
  const totalNom=beliF.reduce((s,r)=>s+(r.nominal||0),0);
  document.getElementById('ds-nom').textContent=totalNom?'Rp '+totalNom.toLocaleString('id-ID'):'—';

  if(ACTIVE_TAB==='rka'){
    document.getElementById('table-head').innerHTML=`<tr>
      <th onclick="sortBy('id')">ID ${arrow('id')}</th>
      <th onclick="sortBy('timestamp')">Waktu ${arrow('timestamp')}</th>
      <th onclick="sortBy('mds')">MDS ${arrow('mds')}</th>
      <th onclick="sortBy('area')">Area ${arrow('area')}</th>
      <th onclick="sortBy('store')">Toko ${arrow('store')}</th>
      <th onclick="sortBy('avail')">Ada ${arrow('avail')}</th>
      <th onclick="sortBy('unavail')">Tdk ${arrow('unavail')}</th>
      <th>AV%</th>
    </tr>`;
    document.getElementById('table-body').innerHTML = rows.length ? rows.map(r=>{
      const pct=r.avail+r.unavail>0?Math.round(r.avail/(r.avail+r.unavail)*100):0;
      const ts=r.timestamp instanceof Date?r.timestamp:new Date(r.timestamp);
      return `<tr>
        <td class="td-id">${r.id||'—'}</td>
        <td style="color:rgba(255,255,255,.5);font-size:12px">${ts.toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'})} ${ts.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})}</td>
        <td class="td-mds">${r.mds||'—'}</td>
        <td class="td-area">${r.area||'—'}</td>
        <td class="td-store">${r.store||'—'}</td>
        <td><span class="tag green">${r.avail||0}</span></td>
        <td><span class="tag red">${r.unavail||0}</span></td>
        <td><span class="tag ${pct>=80?'green':pct>=60?'blue':'red'}">${pct}%</span></td>
      </tr>`;
    }).join('') : '<tr><td colspan="8"><div class="empty-state">Tidak ada data untuk filter ini.</div></td></tr>';
  } else {
    document.getElementById('table-head').innerHTML=`<tr>
      <th onclick="sortBy('id')">ID ${arrow('id')}</th>
      <th onclick="sortBy('timestamp')">Waktu ${arrow('timestamp')}</th>
      <th onclick="sortBy('mds')">MDS ${arrow('mds')}</th>
      <th onclick="sortBy('area')">Area ${arrow('area')}</th>
      <th onclick="sortBy('store')">Toko ${arrow('store')}</th>
      <th onclick="sortBy('nominal')">Nominal ${arrow('nominal')}</th>
      <th onclick="sortBy('totalRenceng')">Renceng ${arrow('totalRenceng')}</th>
    </tr>`;
    document.getElementById('table-body').innerHTML = rows.length ? rows.map(r=>{
      const ts=r.timestamp instanceof Date?r.timestamp:new Date(r.timestamp);
      return `<tr>
        <td class="td-id">${r.id||'—'}</td>
        <td style="color:rgba(255,255,255,.5);font-size:12px">${ts.toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'})} ${ts.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})}</td>
        <td class="td-mds">${r.mds||'—'}</td>
        <td class="td-area">${r.area||'—'}</td>
        <td class="td-store">${r.store||'—'}</td>
        <td><span class="tag gold">Rp ${(r.nominal||0).toLocaleString('id-ID')}</span></td>
        <td><span class="tag green">${r.totalRenceng||0}</span></td>
      </tr>`;
    }).join('') : '<tr><td colspan="7"><div class="empty-state">Tidak ada data untuk filter ini.</div></td></tr>';
  }
  document.getElementById('tfoot').textContent=`Menampilkan ${rows.length} dari ${data.length} data`;
}

// ── EXPORT CSV ───────────────────────────────────────────────────────────────
function exportCSV(){
  const data=ACTIVE_TAB==='rka'?RKA_ALL:BELI_ALL;
  const rows=sorted(filtered(data));
  let csv='';
  if(ACTIVE_TAB==='rka'){
    csv='ID,Waktu,MDS,Area,Toko,Ada,Tidak Ada,AV%\n';
    csv+=rows.map(r=>{
      const ts=r.timestamp instanceof Date?r.timestamp:new Date(r.timestamp);
      const pct=r.avail+r.unavail>0?Math.round(r.avail/(r.avail+r.unavail)*100):0;
      return [r.id,ts.toLocaleString('id-ID'),r.mds,r.area,`"${r.store}"`,r.avail,r.unavail,pct+'%'].join(',');
    }).join('\n');
  } else {
    csv='ID,Waktu,MDS,Area,Toko,Nominal,Renceng\n';
    csv+=rows.map(r=>{
      const ts=r.timestamp instanceof Date?r.timestamp:new Date(r.timestamp);
      return [r.id,ts.toLocaleString('id-ID'),r.mds,r.area,`"${r.store}"`,r.nominal,r.totalRenceng].join(',');
    }).join('\n');
  }
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url;
  a.download=`MDS_${ACTIVE_TAB}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
}
</script>
</body>
</html>
